name: Deploy API to Fly.io (staging)

# Triggers:
#   - workflow_dispatch (pick ref)
#   - pull_request labeled deploy-staging (after review; waits on staging environment approval)
on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch, tag, or SHA)
        required: true
        default: main
  pull_request:
    types:
      - labeled
    branches:
      - main

concurrency:
  group: deploy-api-${{ github.event.pull_request.number || github.event.inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Fly.io (staging)
    runs-on: ubuntu-latest
    environment: staging
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
        github.event.label.name == 'deploy-staging' &&
        github.event.pull_request.state == 'open' &&
        github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.event.pull_request.head.sha }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/api/go.mod
          cache: true
          cache-dependency-path: services/api/go.sum

      - name: Run tests
        working-directory: ./services/api
        run: go test ./...

      - name: Validate required secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DB_URL: ${{ secrets.DB_URL }}
        run: |
          missing=""
          [ -z "$FLY_API_TOKEN" ]       && missing="$missing FLY_API_TOKEN"
          [ -z "$SUPABASE_URL" ]        && missing="$missing SUPABASE_URL"
          [ -z "$SUPABASE_SERVICE_KEY" ] && missing="$missing SUPABASE_SERVICE_KEY"
          [ -z "$DB_URL" ]              && missing="$missing DB_URL"
          if [ -n "$missing" ]; then
            echo "ERROR: Missing required secrets:$missing"
            exit 1
          fi
          echo "All required secrets are present."

      - name: Setup Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Sync secrets to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DB_URL: ${{ secrets.DB_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -- \
            DB_URL="$DB_URL" \
            SUPABASE_URL="$SUPABASE_URL" \
            SUPABASE_SERVICE_KEY="$SUPABASE_SERVICE_KEY" \
            ENVIRONMENT="staging"

          if [ -n "$SUPABASE_ANON_KEY" ]; then
            set -- "$@" SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
          fi

          if [ -n "$ANTHROPIC_API_KEY" ]; then
            set -- "$@" ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY"
          fi

          flyctl secrets set "$@" --app fucci-api --stage

      - name: Validate database host resolves
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: |
          DB_HOST=$(echo "$DB_URL" | sed -n 's|.*@\([^/:?]*\).*|\1|p')
          if [ -z "$DB_HOST" ]; then
            echo "ERROR: Could not extract hostname from DB_URL. Ensure DB_URL is a valid postgres:// connection string."
            exit 1
          fi
          echo "Checking DNS for database host: $DB_HOST"
          if ! getent hosts "$DB_HOST" >/dev/null 2>&1 && ! host "$DB_HOST" >/dev/null 2>&1; then
            echo ""
            echo "ERROR: DNS resolution failed for '$DB_HOST'."
            echo ""
            echo "Likely causes:"
            echo "  1. Supabase free-tier project is PAUSED — resume it at https://supabase.com/dashboard"
            echo "  2. The DB_URL secret contains a stale project reference."
            echo ""
            exit 1
          fi
          echo "Database host '$DB_HOST' resolves OK."

      - name: Deploy to Fly.io
        working-directory: ./services/api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --wait-timeout 600

      - name: Health check
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Waiting for deployment to stabilise..."
          sleep 15
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --max-time 10 https://fucci-api.fly.dev/v1/api/health)
          if [ "$STATUS" -ne 200 ]; then
            echo "Health check failed — HTTP $STATUS"
            flyctl logs --app fucci-api --no-tail
            exit 1
          fi
          echo "Health check passed — HTTP $STATUS"

      - name: Verify deployment status
        if: always()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if ! command -v flyctl >/dev/null 2>&1; then
            echo "Skipping flyctl status (CLI not on PATH — an earlier step failed before Setup Fly.io)."
            exit 0
          fi
          flyctl status --app fucci-api

      - name: Job summary
        if: always()
        run: |
          echo "## API deploy (staging)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Ref: \`${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || format('PR #{0}', github.event.pull_request.number) }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
