openapi: 3.0.3
info:
  title: Fucci Google Auth API
  version: 1.0.0
  description: Contract for Google OAuth registration/sign-in endpoint.
paths:
  /auth/google:
    post:
      summary: Exchange Google auth code and authenticate user
      operationId: postAuthGoogle
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleAuthRequest'
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoogleAuthSuccess'
        '400':
          description: Invalid request or unverified email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidCode:
                  value:
                    code: INVALID_CODE
                    error: Malformed or expired auth code
                emailNotVerified:
                  value:
                    code: EMAIL_NOT_VERIFIED
                    error: Google email is not verified
                invalidRedirectURI:
                  value:
                    code: INVALID_REDIRECT_URI
                    error: redirect_uri is not allowed
        '401':
          description: Token signature/verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                verifyFailed:
                  value:
                    code: TOKEN_VERIFY_FAILED
                    error: Unable to verify Google ID token
        '409':
          description: Existing email account created via password auth
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                accountExists:
                  value:
                    code: ACCOUNT_EXISTS_EMAIL
                    error: Email already registered via password
        '500':
          description: Google API exchange failure or unexpected backend error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                googleApiError:
                  value:
                    code: GOOGLE_API_ERROR
                    error: Google token exchange failed
        '503':
          description: Google OAuth configuration is missing on the server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notConfigured:
                  value:
                    code: GOOGLE_AUTH_NOT_CONFIGURED
                    error: Google OAuth is not configured on the server
components:
  schemas:
    GoogleAuthRequest:
      type: object
      required:
        - code
        - redirect_uri
      properties:
        code:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
    GoogleAuthSuccess:
      type: object
      required:
        - token
        - user
        - is_new
      properties:
        token:
          type: string
        is_new:
          type: boolean
        user:
          $ref: '#/components/schemas/UserSummary'
    UserSummary:
      type: object
      required:
        - id
        - email
        - firstname
        - lastname
        - display_name
        - avatar_url
        - is_verified
        - is_active
        - role
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int32
        email:
          type: string
          format: email
        firstname:
          type: string
        lastname:
          type: string
        display_name:
          type: string
        avatar_url:
          type: string
        is_verified:
          type: boolean
        is_active:
          type: boolean
        role:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
    ErrorResponse:
      type: object
      required:
        - code
        - error
      properties:
        code:
          type: string
          enum:
            - INVALID_CODE
            - INVALID_REDIRECT_URI
            - EMAIL_NOT_VERIFIED
            - TOKEN_VERIFY_FAILED
            - ACCOUNT_EXISTS_EMAIL
            - GOOGLE_API_ERROR
            - GOOGLE_AUTH_NOT_CONFIGURED
        error:
          type: string
